services:
  - type: web
    name: autopublisher-api
    env: python
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port 10000
    envVars:
      - key: SECRET_KEY
        generateValue: true
      - key: DATABASE_URL
        sync: false   # postgresql+asyncpg://... de Neon
      - key: BOT_TOKEN
        sync: false   # token de BotFather
      - key: TELEGRAM_API_ID
        sync: false   # de my.telegram.org
      - key: TELEGRAM_API_HASH
        sync: false
      - key: MAX_POSTS_PER_HOUR
        value: "20"

  - type: web
    name: autopublisher-miniapp
    env: static
    buildCommand: cd frontend && npm install && npm run build
    staticPublishPath: frontend/dist
    envVars:
      - key: VITE_API_URL
        sync: false   # URL pública del servicio autopublisher-api
